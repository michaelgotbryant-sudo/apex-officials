<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APEX ESPORTS LAUNCHER</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
video {
  position: fixed;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  filter: brightness(0.35) contrast(1.2);
  z-index: -2;
}

.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.85));
  z-index: -1;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

.intro.hide {
  opacity: 0;
  visibility: hidden;
  transition: 1s ease;
}

.intro h1 {
  font-size: 90px;
  letter-spacing: 18px;
}

.intro p {
  color: #888;
  font-size: 12px;
  letter-spacing: 3px;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 18px;
  background: rgba(0,0,0,0.55);
}

.nav button {
  background: none;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* PAGES */
.page {
  display: none;
  min-height: 100vh;
  padding: 120px 20px 60px;
  text-align: center;
  flex-direction: column;
  align-items: center;
}

.page.active {
  display: flex;
}

/* PANEL */
.panel {
  margin-top: 20px;
  max-width: 750px;
  padding: 20px 30px;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  text-align: left;
  line-height: 1.6;
}

/* INPUTS */
input, select, textarea {
  padding: 10px;
  width: 260px;
  margin: 6px;
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

/* FIX DROPDOWN VISIBILITY */
select, option {
  color: black;
  background: white;
}

textarea {
  height: 80px;
  resize: none;
}

/* STATS */
.stats {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
}

.statBox {
  padding: 15px 25px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  min-width: 170px;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-digital-grid-and-particles-1637/1080p.mp4">
</video>

<div class="overlay"></div>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>APEX</h1>
  <p id="introText"></p>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('home')">HOME</button>
  <button onclick="show('apply')">APPLY</button>
  <button onclick="show('pro')">PRO APPLY</button>
  <button onclick="show('coach')">COACH APPLY</button>
  <button onclick="show('about')">ABOUT</button>
  <button onclick="show('stats')">STATS</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h2>WELCOME TO APEX</h2>
  <p id="homeText" style="color:#aaa;"></p>
</div>

<!-- APPLY -->
<div id="apply" class="page">
  <h2>APPLICATION</h2>
  <div class="panel">
    <input id="name" placeholder="Name"><br>
    <input id="discord" placeholder="Discord"><br>
    <textarea id="reason" placeholder="Why join?"></textarea><br>
    <button onclick="submitApp()">SUBMIT</button>
  </div>
</div>

<!-- PRO APPLY -->
<div id="pro" class="page">
  <h2>PRO APPLY</h2>
  <div class="panel">
    <input id="proName" placeholder="Name"><br>
    <input id="proDiscord" placeholder="Discord Username"><br>

    <select id="rank">
      <option>What’s your rank?</option>
      <option>Bronze</option>
      <option>Silver</option>
      <option>Gold</option>
      <option>Platinum</option>
      <option>Diamond</option>
      <option>Elite</option>
      <option>Champion</option>
      <option>Unreal</option>
    </select><br>

    <textarea id="proReason" placeholder="Why pro?"></textarea><br>
    <button onclick="submitPro()">SUBMIT</button>
  </div>
</div>

<!-- COACH APPLY -->
<div id="coach" class="page">
  <h2>COACH APPLY</h2>
  <div class="panel">
    <input id="coachName" placeholder="Name"><br>
    <input id="coachDiscord" placeholder="Discord"><br>

    <select id="hasCoached">
      <option value="">Have you coached before?</option>
      <option>Yes</option>
      <option>No</option>
    </select><br>

    <textarea id="coachReason" placeholder="Why coach?"></textarea><br>
    <button onclick="submitCoach()">SUBMIT</button>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h2>ABOUT APEX</h2>
  <div class="panel">
    <p><b>APEX</b> is a competitive esports organization built for players who want to dominate.</p>
    <p>We focus on skill, discipline, and competitive progression.</p>
    <p><b>MINDSET:</b> We don’t lose — we adapt and dominate.</p>
  </div>
</div>

<!-- STATS -->
<div id="stats" class="page">
  <h2>STATS</h2>
  <div class="stats" id="statsBox"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQE9kuVnS2ocgUBnCeh4PapGsJBoaWJPs",
  authDomain: "apex-1afbc.firebaseapp.com",
  projectId: "apex-1afbc",
  storageBucket: "apex-1afbc.firebasestorage.app",
  messagingSenderId: "175993919550",
  appId: "1:175993919550:web:093a686a9e9a4f8238596f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const appsRef = collection(db, "applications");
const proRef = collection(db, "proApplications");
const coachRef = collection(db, "coachApplications");
const membersRef = collection(db, "members");

window.statsData = {apps:0,pro:0,coach:0,members:32};

function render(){
  document.getElementById("statsBox").innerHTML = `
  <div class="statBox">Applications<br>${statsData.apps}</div>
  <div class="statBox">Pro Apps<br>${statsData.pro}</div>
  <div class="statBox">Members<br>${statsData.members}</div>
  <div class="statBox">Coaches<br>1</div>
  <div class="statBox">Coach Apps<br>${statsData.coach}</div>
  `;
}

onSnapshot(query(appsRef),(s)=>{statsData.apps=s.size;render();});
onSnapshot(query(proRef),(s)=>{statsData.pro=s.size;render();});
onSnapshot(query(coachRef),(s)=>{statsData.coach=s.size;render();});
onSnapshot(query(membersRef),(s)=>{statsData.members=s.size;render();});

/* FIXED BUTTONS */
window.submitApp = async ()=>{
  await addDoc(appsRef,{
    name:document.getElementById("name").value,
    discord:document.getElementById("discord").value,
    reason:document.getElementById("reason").value
  });
};

window.submitPro = async ()=>{
  await addDoc(proRef,{
    name:document.getElementById("proName").value,
    discord:document.getElementById("proDiscord").value,
    rank:document.getElementById("rank").value,
    reason:document.getElementById("proReason").value
  });
};

window.submitCoach = async ()=>{
  await addDoc(coachRef,{
    name:document.getElementById("coachName").value,
    discord:document.getElementById("coachDiscord").value,
    coached:document.getElementById("hasCoached").value,
    reason:document.getElementById("coachReason").value
  });
};

/* NAV */
window.show=(p)=>{
  document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
  document.getElementById(p).classList.add("active");
};

/* SAYINGS */
const sayings=[
  "We don’t lose — we dominate.",
  "Only grinders survive APEX.",
  "We are built different."
];

document.getElementById("introText").innerText =
sayings[Math.floor(Math.random()*sayings.length)];

document.getElementById("homeText").innerText =
sayings[Math.floor(Math.random()*sayings.length)];
</script>

</body>
</html>
